<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>You're offline — The Voice</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#fafaf8;color:#0d0d0d;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .logo{font-family:'Libre Baskerville',Georgia,serif;font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2rem;padding-bottom:1rem;border-bottom:3px double #0d0d0d;width:100%;max-width:400px}
    .icon{width:64px;height:64px;border:2px solid #e0ddd8;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;color:#888}
    h1{font-family:'Libre Baskerville',Georgia,serif;font-size:24px;font-weight:800;margin-bottom:0.75rem;letter-spacing:-0.01em}
    p{font-size:14px;color:#888;line-height:1.7;max-width:320px;margin:0 auto 2rem}
    button{background:#0d0d0d;color:#fff;border:none;padding:10px 28px;font-size:13px;font-weight:700;letter-spacing:0.06em;cursor:pointer;font-family:inherit;transition:background 0.15s}
    button:hover{background:#c0392b}
  </style>
</head>
<body>
  <div class="logo">THE VOICE</div>
  <div class="icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
  </div>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Your saved articles are still accessible.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
